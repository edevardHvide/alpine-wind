    <line x1="14.9" y1="29.25" x2="10.5" y2="30.5"/>
    <line x1="19.5" y1="26.6" x2="20" y2="30.5"/>
    <line x1="19.5" y1="26.6" x2="16" y2="27.5"/>
    <!-- Upper-left spoke branches -->
